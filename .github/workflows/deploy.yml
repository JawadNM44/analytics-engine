name: CI / CD — Analytics Engine

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  TF_VERSION: "1.8.4"
  PYTHON_VERSION: "3.12"

permissions:
  contents: read
  id-token: write   # Required for keyless GCP auth via Workload Identity

jobs:
  # ── 1. Unit Tests ────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install test dependencies
        run: |
          pip install pytest pytest-cov
          # Install function deps with stubs for GCP clients
          pip install functions-framework google-cloud-bigquery \
                      google-cloud-secret-manager google-auth

      - name: Run unit tests
        run: pytest tests/ -v --tb=short --cov=function --cov-report=term-missing

  # ── 2. Terraform Validate + Plan ─────────────────────────────────────────────
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (Workload Identity)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}   # projects/PROJECT_NUMBER/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account:            ${{ secrets.WIF_SA_EMAIL }}    # sa-github-cicd@PROJECT_ID.iam.gserviceaccount.com

      - name: Set up Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Create build directory for function zip
        run: mkdir -p ../.build

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -var="github_repo=${{ github.repository }}" \
            -out=tfplan
        env:
          TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/tfplan
          retention-days: 1

      - name: Upload function zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: function-zip
          path: .build/function.zip
          retention-days: 1

  # ── 3. Terraform Apply (main branch only) ────────────────────────────────────
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production  # Requires manual approval in GitHub Environments settings

    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (Workload Identity)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account:            ${{ secrets.WIF_SA_EMAIL }}

      - name: Set up Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Download function zip artifact
        uses: actions/download-artifact@v4
        with:
          name: function-zip
          path: .build

      - name: Terraform Init
        run: terraform init

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_project_id:  ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_github_repo: ${{ github.repository }}
          TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}

      - name: Output infrastructure endpoints
        run: terraform output -json
