name: CI / CD — Analytics Engine

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_coinbase_producer:
        description: "Deploy/restart the always-on coinbase-producer (costs ~EUR 50/mo)"
        type: choice
        default: "false"
        options: ["false", "true"]

env:
  TF_VERSION: "1.8.4"
  PYTHON_VERSION: "3.12"

permissions:
  contents: read
  id-token: write   # Required for keyless GCP auth via Workload Identity

jobs:
  # ── 1. Unit Tests ────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install test dependencies
        run: |
          pip install pytest pytest-cov httpx
          # Install function deps with stubs for GCP clients
          pip install functions-framework google-cloud-bigquery \
                      google-cloud-secret-manager google-auth \
                      fastapi

      - name: Run unit tests
        run: pytest tests/ -v --tb=short --cov=function --cov=function-crypto --cov=api-public --cov=producer-coinbase --cov-report=term-missing

  # ── 2. Terraform Validate + Plan ─────────────────────────────────────────────
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (Workload Identity)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}   # projects/PROJECT_NUMBER/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account:            ${{ secrets.WIF_SA_EMAIL }}    # sa-github-cicd@PROJECT_ID.iam.gserviceaccount.com

      - name: Set up Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Create build directory for function zip
        run: mkdir -p ../.build

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -var="github_repo=${{ github.repository }}" \
            -out=tfplan
        env:
          TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/tfplan
          retention-days: 1

      - name: Upload function build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: function-build
          path: .build/
          include-hidden-files: true
          retention-days: 1

  # ── 3. Terraform Apply (main branch only) ────────────────────────────────────
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production  # Requires manual approval in GitHub Environments settings

    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (Workload Identity)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account:            ${{ secrets.WIF_SA_EMAIL }}

      - name: Set up Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Download function build artifacts
        uses: actions/download-artifact@v4
        with:
          name: function-build
          path: .build

      - name: Terraform Init
        run: terraform init

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_project_id:  ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_github_repo: ${{ github.repository }}
          TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}

      - name: Output infrastructure endpoints
        run: terraform output -json

  # ── 4. Deploy Coinbase Producer (long-running Cloud Run worker) ─────────────
  # NOTE: deliberately gated. The Coinbase WebSocket worker has to run
  # always-on (~EUR 50/month) so we don't want CI to silently restart it
  # on every push. Trigger manually via:
  #   gh workflow run deploy.yml -f deploy_coinbase_producer=true
  # Or set the repository variable DEPLOY_COINBASE_PRODUCER_ON_PUSH=true.
  deploy-coinbase-producer:
    name: Deploy Coinbase Producer
    runs-on: ubuntu-latest
    needs: terraform-apply
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push' &&
       vars.DEPLOY_COINBASE_PRODUCER_ON_PUSH == 'true')
      ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy_coinbase_producer == 'true')

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (Workload Identity)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SA_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy coinbase-producer to Cloud Run (source-based)
        run: |
          gcloud run deploy coinbase-producer \
            --source ./producer-coinbase \
            --region us-central1 \
            --platform managed \
            --no-allow-unauthenticated \
            --no-cpu-throttling \
            --min-instances 1 \
            --max-instances 1 \
            --memory 512Mi \
            --cpu 1 \
            --port 8080 \
            --service-account sa-coinbase-producer@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --build-service-account projects/${{ secrets.GCP_PROJECT_ID }}/serviceAccounts/sa-function-build@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --set-env-vars "^|^GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}|PUBSUB_TOPIC=crypto-trades|PRODUCT_IDS=BTC-USD,ETH-USD,SOL-USD" \
            --quiet

  # ── 5. Deploy Public Crypto API (FastAPI on Cloud Run) ──────────────────────
  deploy-public-api:
    name: Deploy Public Crypto API
    runs-on: ubuntu-latest
    needs: terraform-apply
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (Workload Identity)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SA_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      # Public read-only API. Safety net is three-layered:
      #   - --max-instances 5 caps concurrent compute
      #   - MAX_BYTES_BILLED env caps each BQ scan to 100 MB
      #   - sa-public-api has only dataViewer on transactions_ds + jobUser
      - name: Deploy crypto-api to Cloud Run
        run: |
          gcloud run deploy crypto-api \
            --source ./api-public \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated \
            --min-instances 0 \
            --max-instances 5 \
            --memory 256Mi \
            --cpu 1 \
            --port 8080 \
            --timeout 30s \
            --service-account sa-public-api@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --build-service-account projects/${{ secrets.GCP_PROJECT_ID }}/serviceAccounts/sa-function-build@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --set-env-vars "^|^GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}|BQ_DATASET=transactions_ds|ALLOWED_SYMBOLS=BTC-USD,ETH-USD,SOL-USD|MAX_BYTES_BILLED=104857600" \
            --quiet
